{% extends "layout.html" %}
{% block content %}

<div class="max-w-xl mx-auto space-y-6 fade-up pb-32 pt-4">

    <!-- 1. INSTRUCTION CARD -->
    <div class="bg-white p-6 rounded-[30px] shadow-lg border border-slate-50">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-[#0A2540]">{{ task.title }}</h2>
            <p class="text-sm text-slate-500 mt-1">মনোযোগ দিয়ে নিয়মগুলো পড়ুন</p>
            <div class="mt-3 inline-block bg-green-100 text-green-700 px-4 py-1 rounded-full text-sm font-bold">
                রিওওার্ড: ৳ {{ task.reward }}
            </div>
        </div>

        <!-- Tutorial Link -->
        <div class="mb-6">
            <p class="text-xs font-bold text-slate-700 mb-2">১. টিউটোরিয়াল ভিডিও দেখুন:</p>
            <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-sm">
                <iframe src="{{ task.tutorial }}" class="absolute inset-0 w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Target Link -->
        <div class="mb-6">
            <p class="text-xs font-bold text-slate-700 mb-2">২. কাজের লিংক:</p>
            <a href="{{ task.link }}" target="_blank" class="block w-full bg-indigo-50 border border-indigo-200 text-indigo-700 text-center py-3 rounded-xl font-bold hover:bg-indigo-100 transition">
                <i class="fa-solid fa-link"></i> লিংকে যান এবং কাজ করুন
            </a>
        </div>
    </div>

    <!-- 2. SUBMISSION FORM -->
    <form method="POST" enctype="multipart/form-data" class="bg-white p-6 rounded-[30px] shadow-xl border border-indigo-50 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-[#4F46E5] to-[#E2136E]"></div>
        
        <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-cloud-arrow-up text-[#4F46E5]"></i> প্রুফ জমা দিন
        </h3>

        <!-- Code Box -->
        <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-1.5">কোড দিন (ভিডিও/অ্যাপ থেকে প্রাপ্ত)</label>
            <input type="text" name="code" required placeholder="Enter Code Here" 
                   class="w-full p-3 border border-slate-200 rounded-xl focus:outline-[#4F46E5] text-sm font-bold text-slate-700">
        </div>

        <!-- Screenshot Upload -->
        <div class="mb-6">
            <label class="block text-xs font-bold text-slate-500 mb-1.5">স্ক্রিনশট দিন</label>
            <div class="relative w-full group">
                <input type="file" name="screenshot" accept="image/*" required 
                       class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                       onchange="updateFileName(this)">
                <div id="uploadBox" class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center group-hover:border-[#4F46E5] transition">
                    <i id="uploadIcon" class="fa-solid fa-image text-2xl text-slate-400 mb-2 group-hover:text-[#4F46E5]"></i>
                    <p id="uploadText" class="text-xs text-slate-500">Choose Image</p>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-[#0A2540] text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-opacity-90 transition">
            জমা দিন
        </button>
    </form>

</div>

<script>
    function updateFileName(input) {
        if (input.files && input.files[0]) {
            document.getElementById('uploadBox').classList.add('border-green-500', 'bg-green-50');
            document.getElementById('uploadIcon').className = 'fa-solid fa-check text-2xl text-green-500 mb-2';
            document.getElementById('uploadText').innerText = input.files[0].name;
            document.getElementById('uploadText').className = 'text-xs text-green-700 font-bold';
        }
    }
</script>
{% endblock %}
